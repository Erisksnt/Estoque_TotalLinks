<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0066CC">
  <title>Totallinks - Estoque</title>
  <link rel="stylesheet" href="estoque-app/css/style.css">
</head>
<body>
  <div id="app">
    <!-- Tela de Login -->
    <div id="loginScreen" class="screen">
      <div class="login-container">
        <div class="login-card">
          <img src="img/logo-menu.png" alt="Total Links" class="logo-login">
          <p class="subtitle">Gestão de estoque</p>
          
          <input type="password" id="senhaEquipe" placeholder="Senha da equipe" class="input">
          <input type="password" id="pinTecnico" placeholder="PIN do técnico" class="input" maxlength="4" inputmode="numeric">
          
          <button id="btnLogin" class="btn btn-primary">Acessar</button>
          <div id="loginError" class="error"></div>
        </div>
      </div>
    </div>

    <!-- Tela Principal -->
    <div id="mainScreen" class="screen">
      <div class="header">
        <div>
           <img src="img/logo-menu.png" alt="Total Links" class="logo-header">
          <p class="greeting">Olá, <span id="tecnicoNome">Técnico</span></p>
        </div>
        <div class="header-right">
          <div class="sync-status">
            <span class="sync-dot online"></span>
            <span class="sync-text">Online</span>
          </div>
          <button id="btnLogout" class="logout-btn">Sair</button>
        </div>
      </div>

      <!-- Cards -->
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-value" id="totalCategorias">0</div>
          <div class="metric-label">Categorias</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="totalCriticos">0</div>
          <div class="metric-label">Críticos</div>
        </div>
      </div>

      <!-- Busca -->
      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Buscar item a ser retirado" class="search-input">
      </div>

      <!-- Fluxo rápido -->
      <div class="section-header">
        <span>Fluxo rápido</span>
      </div>
      <div class="quick-grid" id="quickCategories"></div>

      <!-- Estoque crítico -->
      <div class="section-header">
        <span>Estoque crítico</span>
        <span class="section-link" onclick="verTodosCriticos()">Ver todos</span>
      </div>
      <div id="criticalList" class="critical-list"></div>

      <!-- Status -->
      <div class="sync-card">
        <div class="sync-header">
          <span>Sincronização</span>
          <span class="sync-badge" id="syncBadge">Online</span>
        </div>
        <div class="sync-info">
          <div>Última sync: <span id="lastSync">nunca</span></div>
          <div>Pendentes: <span id="pendingCount">0</span></div>
        </div>
        <button id="syncNowBtn" class="btn-sync">Sincronizar agora</button>
      </div>

        <!-- Botão Incluir -->
        <button id="fabIncluir" class="fab" aria-label="Incluir item">+</button>

    </div>
    
     <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item active" data-nav="home">
        <div class="nav-label">Início</div>
      </div>
      <div class="nav-item" data-nav="search">
        <div class="nav-label">Buscar</div>
      </div>
      <div class="nav-item" data-nav="recentes">
        <div class="nav-label">Recentes</div>
        <span id="badge-recentes" class="badge" style="display: none;">0</span>
      </div>
      <div class="nav-item" data-nav="criticos">
        <div class="nav-label">Crítico</div>
      </div>
    </div>

    <!-- Tela de Itens por Categoria -->
    <div id="itemsScreen" class="screen">
      <div class="screen-header">
        <button class="back-btn" onclick="mostrarTelaPrincipal()">← Voltar</button>
        <h2 id="categoryTitle">Categoria</h2>
      </div>
      <div id="itemsContainer" class="items-list"></div>
    </div>

    <!-- Tela de Retirada -->
    <div id="withdrawScreen" class="screen">
      <div class="screen-header">
        <button class="back-btn" onclick="mostrarTelaPrincipal('itemsScreen')">← Voltar</button>
        <h2>Retirar item</h2>
      </div>
      
      <div class="withdraw-card">
        <div class="item-name" id="withdrawItemName"></div>
        <div class="item-stock" id="withdrawItemStock"></div>
        
        <div class="quantity-section">
          <label>Quantidade</label>
          <div class="quantity-control">
            <button id="qtdeMenos" class="qty-btn">-</button>
            <span id="qtdeValor" class="qty-value">1</span>
            <button id="qtdeMais" class="qty-btn">+</button>
          </div>
        </div>
        
        <div id="patrimoniosContainer" style="display:none;">
          <label>Patrimônios</label>
          <div id="patrimoniosList"></div>
        </div>
        
        <div class="obs-section">
          <label>Observação</label>
          <textarea id="observacao" class="obs-input" rows="2" placeholder="Motivo da retirada, local de instalação..."></textarea>
        </div>
        
        <button id="btnConfirmar" class="btn-confirm">Confirmar retirada</button>
        <div id="withdrawError" class="error"></div>
      </div>
    </div>

    <!-- Tela de Busca Global -->
    <div id="searchScreen" class="screen">
      <div class="screen-header">
        <button class="back-btn" onclick="mostrarTelaPrincipal()">← Voltar</button>
        <h2>Buscar item</h2>
      </div>
      <div class="search-container-full">
        <input type="text" id="globalSearchInput" placeholder="Nome do item..." class="search-input-full">
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>

    <!-- Tela de Retiradas Recentes -->
    <div id="recentesScreen" class="screen">
      <div class="screen-header">
        <button class="back-btn" onclick="mostrarTelaPrincipal()">← Voltar</button>
        <h2>Recentes</h2>
      </div>
      <div id="recentesList" class="recentes-list"></div>
    </div>

    <!-- Tela de Todos os Críticos -->
    <div id="criticosScreen" class="screen">
      <div class="screen-header">
        <button class="back-btn" onclick="mostrarTelaPrincipal()">← Voltar</button>
        <h2>Todos os críticos</h2>
      </div>
      <div id="criticosList" class="criticos-list"></div>
    </div>
    
        <!-- Tela de Inclusão de Itens -->
    <div id="inclusaoScreen" class="screen">
      <div class="screen-header">
        <button class="back-btn" id="backFromInclusao">← Voltar</button>
        <h2>Inclusão</h2>
      </div>

      <div class="form-container">
        <div class="form-group">
          <label>Categoria</label>
          <select id="categoriaInclusao" class="input" required>
            <option value="">Selecione uma categoria</option>
          </select>
        </div>

      <div class="form-group autocomplete-container">
        <label>Item</label>
        <input type="text" id="itemInclusao" class="input" placeholder="Digite ou selecione o item" autocomplete="off">
        <div id="itemAutocompleteList" class="autocomplete-items"></div>
      </div>

      <div class="form-group">
        <label>Quantidade</label>
        <div class="quantity-control">
          <button type="button" id="qtdeInclusaoMenos" class="qty-btn">-</button>
          <span id="qtdeInclusaoValor" class="qty-value">1</span>
          <button type="button" id="qtdeInclusaoMais" class="qty-btn">+</button>
        </div>
      </div>

        <div class="form-group" id="patrimonioInclusaoGroup" style="display: none;">
          <label>Patrimônios</label>
          <div id="patrimoniosInclusaoList"></div>
        </div>

        <div class="form-group">
          <label>Observação</label>
          <textarea id="obsInclusao" class="obs-input" rows="2" placeholder="Motivo da inclusão, observações..."></textarea>
        </div>

        <div class="form-buttons">
          <button id="salvarInclusao" class="btn-confirm">Confirmar inclusão</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>

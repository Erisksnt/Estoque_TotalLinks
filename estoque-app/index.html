<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0066CC">
  <title>Totallinks - Estoque</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="header-left">
        <button id="menuToggle" class="menu-toggle">☰</button>
        <div class="sync-status">
        </div>
      </div>
      <div class="header-right">
        <img src="img/logo-menu.png" alt="Total Links" class="logo-header">
      </div>
    </div>
    
    <!-- Tela de Login -->
    <div id="loginScreen" class="screen">
      <div class="login-container">
        <div class="login-card">
          <img src="img/logo-menu.png" alt="Total Links" class="logo-login">
          <p class="subtitle">Gestão de estoque</p>
          <input type="password" id="senhaEquipe" placeholder="Senha da equipe" class="input">
          <input type="password" id="pinTecnico" placeholder="PIN do técnico" class="input" maxlength="4" inputmode="numeric">
          <button id="btnLogin" class="btn btn-primary">Acessar</button>
          <div id="loginError" class="error"></div>
        </div>
      </div>
    </div>

    <!-- Tela Principal -->
    <div id="mainScreen" class="screen">  
      <button id="fabIncluir" class="fab" aria-label="Incluir item">+</button>
      <!-- Cards -->
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-value" id="totalCategorias">0</div>
          <div class="metric-label">Categorias</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="totalCriticos">0</div>
          <div class="metric-label">Críticos</div>
        </div>
      </div>
    
      <!-- Busca -->
      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Buscar item..." class="search-input">
      </div>
    
      <!-- Fluxo rápido -->
      <div class="section-header">
        <span>Fluxo rápido</span>
      </div>
      <div class="quick-grid" id="quickCategories"></div>
    
      <!-- Estoque crítico -->
      <div id="criticalSection">
        <div class="section-header">
          <span>Estoque crítico</span>
          <span class="section-link" onclick="verTodosCriticos()">Ver todos</span>
        </div>
        <div id="criticalList" class="critical-list"></div>
      </div>
    
      <!-- Status -->
      <div class="sync-card">
        <div class="sync-header">
          <span>Sincronização</span>
          <span class="sync-badge" id="syncBadge">Online</span>
        </div>
        <div class="sync-info">
          <div>Última sync: <span id="lastSync">nunca</span></div>
          <div>Pendentes: <span id="pendingCount">0</span></div>
        </div>
        <button id="syncNowBtn" class="btn-sync">Sincronizar agora</button>
      </div>
    </div>

    <!-- Menu lateral (sidebar) -->
    <div id="sideMenu" class="side-menu">
      <div class="side-menu-header">
        <h3>Menu</h3>
        <button id="closeMenu" class="close-menu">✕</button>
      </div>
      <p class="greeting">Olá, <span id="tecnicoNome">Técnico</span></p>
      <hr class="menu-divider">
      <div class="side-menu-items">
        <div class="side-item" data-nav="home">Início</div>
        <div class="side-item" data-nav="equipamentos">Estoque</div>
        <div class="side-item" data-nav="incluir">Incluir Equipamento</div>
        <div class="side-item" data-nav="retirar">Retirar Equipamento</div>
        <div class="side-item" data-nav="devolucao">Devolver Equipamento</div>
        <div class="side-item" data-nav="recentes">Movimentações Recentes<span id="menuBadgeRecentes" class="badge-menu" style="display: none;">0</span></div>
        <div class="side-item" data-nav="solicitacao">Solicitar Compra</div>
        <div class="side-item" data-nav="criticos">Itens Críticos</div>
        <div class="side-item" data-nav="logout">Sair</div>
      </div>
    </div>

    <!-- Tela de Itens por Categoria -->
    <div id="itemsScreen" class="screen">
      <div class="screen-header">
      </div>
      <div id="itemsContainer" class="items-list"></div>
    </div>

    <!-- Tela de Equipamentos (somente admin) -->
    <div id="equipamentosScreen" class="screen">
      <div class="equipamentos-container">

        <!-- Campo de busca -->
      <div class="equipamentos-search">
        <input type="text" id="equipamentosSearchInput" class="input" placeholder="Buscar por item...">
      </div>

        <!-- Abas -->
        <div class="equipamentos-tabs">
          <button id="tabEstoqueBtn" class="tab-btn active">Estoque</button>
          <button id="tabTecnicosBtn" class="tab-btn">Técnicos</button>
        </div>
        <!-- Área da lista -->
        <div id="equipamentosList" class="equipamentos-list"></div>
      </div>

    <!-- Botão Incluir -->
    <button id="fabIncluir" class="fab" aria-label="Incluir item">+</button>
  </div>

  <!-- Tela de Retirada -->
  <div id="withdrawScreen" class="screen">  
    <div class="form-container">
      <!-- Campo de busca de item -->
      <div class="form-group autocomplete-container">
        <label>Buscar item a ser Retirado do Estoque</label>
        <input type="text" id="itemBuscaRetirada" class="input" placeholder="Digite o nome do item" autocomplete="off">
        <div id="itemBuscaRetiradaAutocompleteList" class="autocomplete-items"></div>
      </div>
    
      <!-- Categoria (somente leitura) -->
      <div class="form-group">
        <label>Categoria</label>
        <input type="text" id="categoriaRetirada" class="input" readonly placeholder="Selecionada automaticamente">
      </div>
    
      <!-- Campo oculto para armazenar o item selecionado -->
      <input type="hidden" id="itemRetiradaHidden">
    
      <div class="form-group">
        <label>Quantidade</label>
        <div class="quantity-control">
          <button type="button" id="qtdeRetiradaMenos" class="qty-btn">-</button>
          <span id="qtdeRetiradaValor" class="qty-value">1</span>
          <button type="button" id="qtdeRetiradaMais" class="qty-btn">+</button>
        </div>
      </div>
    
      <div id="patrimoniosRetiradaContainer" style="display: none;">
        <label>Patrimônios</label>
        <div id="patrimoniosRetiradaList"></div>
      </div>

      <div class="form-group">
        <label>Destino</label>
        <select id="destinoTipo" class="input" required>
          <option value="">Selecione...</option>
          <option value="cliente">Cliente</option>
          <option value="tecnico">Técnico (manutenção/precaução)</option>
        </select>
      </div>

<div id="clienteContainer" class="form-group" style="display: none;">
  <label>Nome do Cliente</label>
  <input type="text" id="destinoCliente" class="input" placeholder="Digite o nome do cliente">
</div>
    
      <div class="form-group">
        <label>Observação</label>
        <textarea id="observacaoRetirada" class="obs-input" rows="2" placeholder="Motivo da retirada, local de instalação..."></textarea>
      </div>
    
      <div class="form-buttons">
        <button id="btnConfirmarRetirada" class="btn-confirm">Confirmar retirada</button>
      </div>
    </div>
  </div>

    <!-- Tela de Busca Global -->
    <div id="searchScreen" class="screen">
      <div class="search-container-full">
        <input type="text" id="globalSearchInput" placeholder="Nome do item..." class="search-input-full">
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>

    <!-- Tela de Retiradas Recentes -->
    <div id="recentesScreen" class="screen">
      <div id="recentesList" class="recentes-list"></div>
    </div>

    <!-- Tela de Todos os Críticos -->
    <div id="criticosScreen" class="screen">
      <div id="criticosList" class="criticos-list"></div>
    </div>
    
    <!-- Tela de Inclusão de Itens (somente compra) -->
    <div id="inclusaoScreen" class="screen">
      <div class="form-container">
        <!-- Campo de busca de item (autocomplete em todo o estoque) -->
        <div class="form-group autocomplete-container">
          <label>Buscar item a ser Incluído no Estoque</label>
          <input type="text" id="itemBuscaInclusao" class="input" placeholder="Digite o nome do item" autocomplete="off">
          <div id="itemBuscaAutocompleteList" class="autocomplete-items"></div>
        </div>
      
        <!-- Categoria (preenchida automaticamente, somente leitura) -->
        <div class="form-group">
          <label>Categoria</label>
          <input type="text" id="categoriaInclusao" class="input" readonly placeholder="Preenchido automaticamente">
        </div>
      
        <!-- Campo oculto para armazenar o nome do item selecionado -->
        <input type="hidden" id="itemInclusaoHidden">
      
        <div class="form-group">
          <label>Quantidade</label>
          <div class="quantity-control">
            <button type="button" id="qtdeInclusaoMenos" class="qty-btn">-</button>
            <span id="qtdeInclusaoValor" class="qty-value">1</span>
            <button type="button" id="qtdeInclusaoMais" class="qty-btn">+</button>
          </div>
        </div>
      
        <div class="form-group" id="patrimonioInclusaoGroup" style="display: none;">
          <label>Patrimônios</label>
          <div id="patrimoniosInclusaoList"></div>
        </div>
      
        <div class="form-group">
          <label>Observação</label>
          <textarea id="obsInclusao" class="obs-input" rows="2" placeholder="Motivo da inclusão, observações..."></textarea>
        </div>
      
        <div class="form-buttons">
          <button id="salvarInclusao" class="btn-confirm">Confirmar inclusão</button>
        </div>
      </div>
    </div>

    <!-- Tela de Devolução de Equipamentos -->
    <div id="devolucaoScreen" class="screen">
      <div class="form-container">
        <div class="form-group">
          <label>Selecione o equipamento a devolver</label>
          <select id="selectEquipamentoDevolucao" class="input" size="5" multiple></select>
        </div>
        <div class="form-group">
          <label>Observação</label>
          <textarea id="obsDevolucao" class="obs-input" rows="2" placeholder="Motivo da devolução..."></textarea>
        </div>
        <div class="form-buttons">
          <button id="btnConfirmarDevolucao" class="btn-confirm">Confirmar devolução</button>
        </div>
      </div>
    </div>

    <!-- Tela de Solicitação de Compra -->
    <div id="solicitacaoScreen" class="screen">
      <div class="form-container">
        <div class="form-group">
          <label>Itens (descreva os itens faltantes)</label>
          <textarea id="itensSolicitacao" class="input" rows="4" placeholder="Exemplo:&#10;1 Rádio Ubiquiti Rocket M5&#10;2 Fontes PoE 48V&#10;1 Cabo de rede CAT6"></textarea>
        </div>
        <div class="form-group">
          <label>Observação (opcional)</label>
          <textarea id="obsSolicitacao" class="obs-input" rows="2" placeholder="Motivo da solicitação, urgência..."></textarea>
        </div>
        <div class="form-buttons">
          <button id="btnEnviarSolicitacao" class="btn-confirm">Enviar Solicitação</button>
        </div>
      </div>
    </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
